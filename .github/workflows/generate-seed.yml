name: Generate Daily Seed

on:
  schedule:
    # Run at midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate seeds to cover all timezones
        run: |
          # Generate seeds for yesterday, today, and tomorrow (UTC)
          # This correctly covers all possible local dates across the world.
          YESTERDAY=$(date -u -d "-1 day" +%Y-%m-%d)
          TODAY=$(date -u +%Y-%m-%d)
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d)

          SALT="${{ secrets.DAILY_SEED_SALT }}"

          SEED_YESTERDAY=$(printf "%d" $(echo -n "${YESTERDAY}${SALT}" | sha256sum | awk '{print "0x" substr($1,1,8)}'))
          SEED_TODAY=$(printf "%d" $(echo -n "${TODAY}${SALT}" | sha256sum | awk '{print "0x" substr($1,1,8)}'))
          SEED_TOMORROW=$(printf "%d" $(echo -n "${TOMORROW}${SALT}" | sha256sum | awk '{print "0x" substr($1,1,8)}'))

          cat > seeds.json << EOF
          {
            "${YESTERDAY}": ${SEED_YESTERDAY},
            "${TODAY}": ${SEED_TODAY},
            "${TOMORROW}": ${SEED_TOMORROW}
          }
          EOF

          # Clean up leading whitespace from heredoc
          sed -i 's/^          //' seeds.json

      - name: Commit and push seeds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seeds.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🎲 Daily seed update for $(date -u +%Y-%m-%d)"
          git push
